name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go: ["1.25.x", "1.26.x"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy -diff
      - run: go test -race -cover ./...
      - run: go vet ./...
